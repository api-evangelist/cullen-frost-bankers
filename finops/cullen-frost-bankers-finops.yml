specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: Cullen/Frost Bankers
providerId: cullen-frost-bankers
publisherName: Cullen/Frost Bankers, Inc.
serviceCategory: Banking
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Banking
  - Financial Services
  - FinOps
  - FOCUS
description: 'FOCUS-aligned FinOps for Cullen/Frost Bankers: banking-relationship fees (account, treasury,
  ACH, wire) per the bank''s schedule rather than API-call metering; no public developer API.'
sources:
  - https://www.frostbank.com/
notes: No public API or API pricing. Reconcile against the bank's customer fee schedule.
principles:
  - name: Visibility
    description: Use Frost's commercial banking statements and treasury reports to see fee categories
      and transaction counts.
  - name: Allocation
    description: Tag accounts / sub-accounts by entity / cost-center for chargeback of treasury and ACH
      activity.
  - name: Optimization
    description: Right-size accounts / services to match transaction volume; consolidate ACH batches;
      eliminate unused treasury services at quarterly relationship review.
  - name: Accountability
    description: Treasury / finance owns the banking relationship; review monthly account analysis statements
      for fee drift.
domains:
  - name: Understand Usage and Cost
    capabilities:
      - Allocation
      - Reporting and Analytics
  - name: Quantify Business Value
    capabilities:
      - Forecasting
      - Budgeting
  - name: Optimize Usage and Cost
    capabilities:
      - Rate Optimization
  - name: Manage the FinOps Practice
    capabilities:
      - Invoicing and Chargeback
billingModel:
  pricingCategory: Per-Service Banking Fees
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Tax
    - Adjustment
  chargeFrequency: Recurring
focusColumns:
  ServiceName: Frost Bank
  ServiceCategory: Banking
  ProviderName: Cullen/Frost Bankers
  PublisherName: Cullen/Frost Bankers, Inc.
  InvoiceIssuerName: Frost Bank
  PricingCategory: Per-Service Fee
  BillingCurrency: USD
  ChargeCategory: Usage
meters:
  - name: ach_transactions
    description: ACH credits / debits originated through Frost
    unit: transaction
    aggregation: sum
    dimensions:
      - account
      - entity
  - name: wire_transfers
    description: Domestic / international wire transfers
    unit: wire
    aggregation: sum
    dimensions:
      - account
      - direction
  - name: account_analysis_fees
    description: Maintenance and treasury services billed via account analysis
    unit: month
    aggregation: sum
    dimensions:
      - account
apis:
  - name: Cullen/Frost Bankers API
    baseURL: https://api.cullenfrost.com
    tags:
      - Banking
      - Financial Services
      - Texas
    serviceName: Cullen/Frost Bankers API
    serviceCategory: API
unitEconomics:
  - name: Cost per ACH Transaction
    metric: billed_cost / ach_transactions
    target: TBD
  - name: Cost per Account
    metric: billed_cost / accounts
    target: TBD
maintainers:
