specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Cullen/Frost Bankers
providerId: cullen-frost-bankers
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Banking
  - Financial Services
  - Rate Limiting
description: Cullen/Frost Bankers does not operate a public developer API portal and does not publish
  rate-limit documentation. Treasury / file-based integrations are throttled per the customer agreement.
sources:
  - https://www.frostbank.com/
notes: No public developer API or rate-limit documentation. Reconcile if Frost Bank publishes an open
  banking surface.
responseCodes:
  throttled: 429
  serviceUnavailable: 503
limits:
  - name: Commercial integration throughput
    scope: customer
    metric: varies
    limit: per commercial / treasury integration agreement
    applies:
      - Cullen/Frost Bankers API
policies:
  - name: Customer agreement scoping
    description: Throughput, file cutoffs, and ACH limits are scoped to the customer's treasury / commercial
      banking agreement.
  - name: Backoff Strategy
    description: Honor Retry-After when present; use exponential backoff with jitter on 429 / 503.
maintainers:
